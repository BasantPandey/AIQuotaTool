# Manually publish the VS Code extension to Visual Studio Marketplace.
# Spec: https://github.com/BasantPandey/AIQuotaTool/issues/18
#
# Live run: quality gates → bump semver → commit/tag → package → vsce publish
# Dry-run: quality gates → package → artifact only (no bump, no Marketplace)
#
# Secret required for live publish: VSCE_PAT (Azure DevOps PAT with Marketplace scope)

name: Publish VS Code extension

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch) to publish from
        required: true
        default: main
        type: string
      bump:
        description: Semver bump when not dry-run
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Package only (no version bump, no Marketplace publish). Uncheck for a live release.
        required: true
        default: true
        type: boolean

# One publish at a time; never cancel a live publish mid-flight
concurrency:
  group: publish-vscode-marketplace
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # Need history for clean version commits/tags
          fetch-depth: 0
          # GITHUB_TOKEN can push tags/commits if branch protection allows it
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm turbo type-check

      - name: Test
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build

      # Boolean workflow inputs are strings in expressions — compare to 'true'/'false'.
      - name: Bump version, commit, and tag
        if: ${{ inputs.dry_run == false || inputs.dry_run == 'false' }}
        id: bump
        working-directory: packages/vscode-ext
        run: |
          set -euo pipefail
          npm version "${{ inputs.bump }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/vscode-ext/package.json
          git commit -m "chore(vscode-ext): bump version to ${VERSION}"
          git tag "vscode-v${VERSION}"
          # Live runs must use a branch name (not a detached SHA) so push can update the branch.
          git push origin "HEAD:${{ inputs.ref }}"
          git push origin "vscode-v${VERSION}"
          echo "Bumped VS Code extension to ${VERSION} and pushed tag vscode-v${VERSION}"

      - name: Resolve package version
        id: version
        working-directory: packages/vscode-ext
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packaging version ${VERSION}"

      - name: Package VSIX
        working-directory: packages/vscode-ext
        run: pnpm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-quota-tool-vscode-${{ steps.version.outputs.version }}
          path: packages/vscode-ext/*.vsix
          if-no-files-found: error

      - name: Require VSCE_PAT for live publish
        if: ${{ inputs.dry_run == false || inputs.dry_run == 'false' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::VSCE_PAT secret is not set. Create an Azure DevOps PAT with Marketplace publish scope and add it as a repository secret named VSCE_PAT. See packages/vscode-ext/README.md (Publishing)."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        if: ${{ inputs.dry_run == false || inputs.dry_run == 'false' }}
        working-directory: packages/vscode-ext
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          # --no-dependencies matches local monorepo packaging (workspace packages already built/bundled)
          npx vsce publish --no-dependencies --pat "${VSCE_PAT}"
          echo "Published BasantPandey.ai-quota-tool-vscode@${{ steps.version.outputs.version }} to Visual Studio Marketplace"

      - name: Summary
        run: |
          {
            echo "## Publish VS Code extension"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Ref | \`${{ inputs.ref }}\` |"
            echo "| Dry run | \`${{ inputs.dry_run }}\` |"
            echo "| Bump | \`${{ inputs.bump }}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo ""
              echo "Dry-run only: VSIX artifact uploaded; no git bump and no Marketplace publish."
            else
              echo ""
              echo "Live publish: version bumped, tagged \`vscode-v${{ steps.version.outputs.version }}\`, and sent to Marketplace."
              echo ""
              echo "Manage listing: https://marketplace.visualstudio.com/manage/publishers/basantpandey"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
